<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobilní Digitální Hodiny</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Použito min-height pro lepší stabilitu na mobilu */
            margin: 0;
        }

        .clock-container {
            text-align: center;
            background: rgba(30, 41, 59, 0.8);
            /* Šířka kontejneru se přizpůsobí mobilu */
            width: 90%;
            max-width: 500px;
            padding: 2.5rem 1rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
        }

        #time {
            /* Dynamická velikost písma: minimálně 3rem, ideálně 15% šířky, maximálně 6rem */
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 800;
            color: #38bdf8;
            line-height: 1.1;
            font-variant-numeric: tabular-nums; /* Zabrání poskakování čísel při změně */
        }

        #date {
            font-size: clamp(1rem, 4vw, 1.4rem);
            margin-top: 1.5rem;
            color: #94a3b8;
            letter-spacing: 0.05em;
        }

        /* Drobná úprava pro velmi malé telefony */
        @media (max-width: 350px) {
            .clock-container {
                padding: 1.5rem 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="time">00:00:00</div>
        <div id="date">Načítání...</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // Čas v českém formátu
            document.getElementById('time').textContent = now.toLocaleTimeString('cs-CZ');
            
            // Datum v českém formátu (zkrácený den pro mobily)
            const options = { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            document.getElementById('date').textContent = now.toLocaleDateString('cs-CZ', options);
        }

        // Tikání každou sekundu
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
