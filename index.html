<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 2s ease;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        #time {
            font-size: clamp(3.5rem, 18vw, 6rem);
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        #date {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-top: 10px;
            text-transform: uppercase;
        }

        #svatek {
            color: #fbbf24;
            margin-top: 5px;
            font-weight: 500;
        }

        /* Sekce pro API Událost */
        .event-box {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: left;
        }

        .event-title {
            color: var(--accent-color);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .event-info {
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            background: #334155;
            height: 6px;
            border-radius: 10px;
            margin: 20px 0;
        }

        #day-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            transition: width 1s;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .weather-item {
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            text-align: center;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(100px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
            animation: move 15s infinite alternate;
        }

        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }
        @media (max-width: 480px) { .weather-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="glass-card">
        <div id="time">00:00:00</div>
        <div id="date">Načítání...</div>
        <div id="svatek">Zjišťuji svátek...</div>
        
        <div class="progress-container">
            <div id="day-progress"></div>
        </div>

        <div class="event-box">
            <span class="event-title">Nadcházející událost:</span>
            <div id="event-content" class="event-info">Načítám data z RapidAPI...</div>
        </div>
    </div>

    <div class="weather-grid">
        <div class="weather-item glass-card" style="margin:0">
            <div style="color: #94a3b8;">Praha</div>
            <div style="font-size: 1.5rem; font-weight: bold;">8°C</div>
        </div>
        <div class="weather-item glass-card" style="margin:0">
            <div style="color: #94a3b8;">Madrid</div>
            <div style="font-size: 1.5rem; font-weight: bold;">19°C</div>
        </div>
    </div>

    <script>
        // Kalendář pro Duben (ukázka)
        const names = {
            3: { 1: "Hugo", 2: "Erika", 3: "Richard", 4: "Ivana", 5: "Miroslava", 6: "Vendula", 7: "Heřman", 8: "Ema", 9: "Dušan", 10: "Darja", 11: "Izabela", 12: "Julius", 13: "Aleš", 14: "Vincenc", 15: "Anastázie", 16: "Irena", 17: "Rudolf", 18: "Valérie", 19: "Rostislav", 20: "Marcela", 21: "Alexandra", 22: "Evženie", 23: "Vojtěch", 24: "Jiří", 25: "Marek", 26: "Oto", 27: "Jaroslav", 28: "Vlastislav", 29: "Robert", 30: "Blahoslav" }
        };

        // 1. FUNKCE PRO ČAS A DESIGN
        function updateCore() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('cs-CZ');
            document.getElementById('date').textContent = now.toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' });
            
            // Svátek
            const name = names[now.getMonth()] ? names[now.getMonth()][now.getDate()] : "Neznámé";
            document.getElementById('svatek').textContent = `Svátek má: ${name}`;

            // Progress dne
            const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const progress = ((now.getTime() - start) / 86400000) * 100;
            document.getElementById('day-progress').style.width = progress + "%";
        }

        // 2. TVOJE API FUNKCE (RAPID API)
        async function fetchRapidAPI() {
            const url = 'https://real-time-events-search.p.rapidapi.com/event-details?event_id=L2F1dGhvcml0eS9ob3Jpem9uL2NsdXN0ZXJlZF9ldmVudC8yMDI1LTEwLTEwfDEyMzU2NDg0MzM2NjU5NjE0MzM1';
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': '4e8a50e2aemsh43f5a2b6ecfb086p1fbdd1jsnababe7e3389d',
                    'x-rapidapi-host': 'real-time-events-search.p.rapidapi.com'
                }
            };

            try {
                const response = await fetch(url, options);
                const result = await response.json();
                
                // Zpracování dat (přizpůsob podle toho, co API vrací)
                if (result.data) {
                    const event = result.data;
                    document.getElementById('event-content').innerHTML = `
                        <strong>${event.name || 'Událost'}</strong><br>
                        ${event.venue ? event.venue.name : 'Místo neuvedeno'}
                    `;
                } else {
                    document.getElementById('event-content').textContent = "Událost nenalezena.";
                }
            } catch (error) {
                console.error(error);
                document.getElementById('event-content').textContent = "Nepodařilo se načíst data.";
            }
        }

        // Spuštění
        setInterval(updateCore, 1000);
        updateCore();
        fetchRapidAPI(); // Voláme jen jednou při načtení, abychom šetřili limity
    </script>
</body>
</html>
