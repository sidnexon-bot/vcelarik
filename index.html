<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osobní Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 2s ease;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        #time {
            font-size: clamp(3.5rem, 18vw, 6.5rem);
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        #date {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #94a3b8;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        #svatek {
            margin-top: 10px;
            font-size: 1rem;
            color: #fbbf24; /* Zlatavá barva pro svátek */
            font-weight: 500;
        }

        .progress-container {
            width: 100%;
            background: #334155;
            height: 6px;
            border-radius: 10px;
            margin: 1.5rem 0 0.5rem;
            overflow: hidden;
        }

        #day-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            transition: width 1s ease-in-out;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .weather-item {
            padding: 1rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .city { font-size: 0.9rem; color: #94a3b8; }
        .temp { font-size: 1.5rem; font-weight: bold; margin: 5px 0; }

        #quote {
            font-style: italic;
            color: #cbd5e1;
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent-color);
            filter: blur(100px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }

        @media (max-width: 480px) {
            .weather-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="glass-card">
        <div id="time">00:00:00</div>
        <div id="date">Načítání...</div>
        <div id="svatek">Dnes má svátek: ...</div>
        
        <div class="progress-container">
            <div id="day-progress"></div>
        </div>
        
        <div id="quote">"Načítání inspirace..."</div>
    </div>

    <div class="weather-grid">
        <div class="weather-item glass-card" style="margin:0">
            <span class="city">Praha</span>
            <span class="temp">8°C</span>
            <span style="font-size: 0.8rem; color: #64748b;">☁️ Polojasno</span>
        </div>
        <div class="weather-item glass-card" style="margin:0">
            <span class="city">Madrid</span>
            <span class="temp">19°C</span>
            <span style="font-size: 0.8rem; color: #64748b;">☀️ Jasno</span>
        </div>
    </div>

    <script>
        // Databáze jmenin (zkrácená ukázka pro duben - v reálu bys měl všech 12 měsíců)

                8: "Ema", 9: "Dušan", 10: "Darja", 11: "Izabela", 12: "Julius", 13: "Aleš", 14: "Vincenc",

        function update() {
            const now = new Date();

};

        document.getElementById('quote').textContent = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;

    </script>
</body>
</html>
